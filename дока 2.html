    - Экранная ширина: **360 пикселей** (мобильный viewport).
    - Рабочая область контента: **328 пикселей** (отступы от краёв экрана по 16px).
    - Высота экрана может меняться в зависимости от количества контента.

        --color-divider: #DCE0E6 (обводки, разделители)
        --color-disabled-bg: #F5F7FA (фон для неактивных элементов)

        --color-warning: #FFA800 (предупреждения)

    Typography:
        --text-heading-large: 500 20px/26px 'Roboto', sans-serif (заголовки экранов)
        --text-heading-medium: 500 18px/26px 'Roboto', sans-serif (подзаголовки, названия карт)
        --text-body-large: 500 16px/24px 'Roboto', sans-serif (активные табы, основные кнопки)
        --text-body-regular: 400 16px/24px 'Roboto', sans-serif (основной текст, поля ввода)
        --text-caption-large: 500 14px/20px 'Roboto', sans-serif (вторичные кнопки, метки)
        --text-caption-regular: 400 14px/20px 'Roboto', sans-serif (текст модалок, ошибки)

3.  COMPONENTS & THEIR USAGE
    --------------------------
    BUTTON
        - .btn (Primary): Главное действие на экране (оплатить, продолжить, сохранить).
          Состояния: default, pressed, disabled.
        - .btn-secondary (Secondary): Альтернативное действие (отмена, назад, нет).
          Состояния: default, pressed, disabled.
        - .btn-short (Short): Пара коротких кнопок для модальных окон (Да/Нет).
          Отступ между кнопками: 16px.
        - .btn-product (Product Actions): Действия по продукту (Перевести/Пополнить).
          Размер: 160×56px, иконка на зелёном круге. Отступ между парой: 8px.
        - .sbp-banner (SBP Banner): Информационная плашка, некликабельная.
          Используется для отображения платёжного метода СБП.

    INPUT
        - .floating-input (Text): Поле ввода текста с плавающим лейблом. Высота 56px.
          Используется для логинов, паролей, сообщений.
        - .floating-input-sum (Sum): Поле для ввода суммы. Высота 64px, шрифт 20px.
          Используется в переводах и платежах.
        - .preview-field-wrapper (Preview): Не редактируемое поле (лейбл + текст + линия).
          Используется для отображения данных без возможности изменения.

    SELECTION
        - .checkbox-label (Checkbox): Квадрат 20×20px, скругление 6px.
          Используется для множественного выбора (выберите несколько вариантов).
        - .radio-label (Radio): Круг 20×20px, скругление 50%.
          Используется для выбора одного варианта из нескольких.
        - .switch-label (Switch): Трек 36×20px, тумблер 16px.
          Используется для включения/выключения опции.

    TAB BAR
        - .tab-bar: Контейнер для табов. Отступ между текстами: 30px.
        - .tab-item: Неактивный таб, цвет text-gray.
        - .tab-item.active: Активный таб, цвет primary, подчёркивание 2px.
          Используется для переключения между разделами на одной странице.

    PRODUCT SELECT
        - .product-select-wrapper: Контейнер.
        - .product-select: Плашка 328×64px, border-radius: 6px, padding: 9px 16px.
          Используется для выбора счёта или карты перед платежом или переводом.
          Состояния: default, .focus, .error, .disabled.

    DROPDOWNS (выпадающие списки)
        - .dropdown-wrapper: Контейнер.
        - .dropdown-field: Поле выбора (64px, аналогично Product Select).
        - .dropdown-content: Выпадающий список. Высота 200px, скролл 4×32px.
        - .dropdown-item-product: Плашка выбора продукта (308×52px, иконка, название, сумма).
        - .dropdown-item-icon-text: Плашка выбора банка (308×56px, иконка, текст).
        - .dropdown-item-text: Плашка выбора периода (308×36px, только текст).
          Используются для выбора из предложенного списка.

    MODALS
        - .modal (Modal): Обычное модальное окно. Ширина 328px, обводка 1px divider,
          тень 0 4px 16px rgba(0,0,0,0.08). Используется для подтверждения действий
          (удалить, выйти, отправить).
        - .driver-sheet (Driver): Нижний лист. Ширина 360px, скругления сверху 16px,
          обводка 1px divider. Используется для навигации по продуктам или выбора
          из нескольких вариантов.

4.  UI/UX & USABILITY GUIDELINES FOR MOBILE BANKING
    ------------------------------------------------------------
    A.  МОБИЛЬНЫЕ UI/UX ПРИНЦИПЫ
        - **Размеры касания (Touch targets)** — все интерактивные элементы должны быть ≥ 48×48px.
        - **Иерархия контента** — наиболее важная информация и действие — вверху экрана, второстепенное — ниже.
        - **Консистентность** — одинаковые элементы выглядят и работают одинаково во всех экранах.
        - **Обратная связь** — любое действие пользователя должно сопровождаться визуальной реакцией: нажатие кнопки, загрузка, сообщения об успехе/ошибке.
        - **Минимизация шагов** — для частых действий (платёж, перевод) — не более 3 шагов.

    B.  ЮЗАБИЛИТИ (Usability)
        - **Предсказуемость** — одинаковые элементы ведут себя одинаково.
        - **Доступность** — контраст текста ≥ 4.5:1, размер шрифта ≥ 12px.
        - **Помощь и подсказки** — подсказывай формат ввода, показывай примеры, используй плейсхолдеры.
        - **Предотвращение ошибок** — валидация полей в реальном времени, блокировка кнопки при незаполненных обязательных полях.
        - **Гибкость и эффективность** — сохраняй шаблоны для частых платежей, автозаполнение.

    C.  БАНКОВСКАЯ СПЕЦИФИКА (Banking-specific)
        - **Безопасность** — критичные действия требуют дополнительного подтверждения (PIN, биометрия, SMS-код).
        - **Доверие** — всегда отображай состояние счёта/карты, скрывай конфиденциальные данные (полные номера карт) по умолчанию.
        - **Финансовая информация** — суммы и валюты должны быть чёткими, крупными. Используй цвет primary для рублей, disabled для копеек и валюты.
        - **Ошибки** — сообщения об ошибках должны быть конкретными и предлагать решение.
        - **Платежи и переводы** — всегда показывай сумму списания и итоговый баланс после операции.
        - **История операций** — фильтруй по дате, типу, сумме, с возможностью поиска.

    D.  НАВИГАЦИЯ И СТРУКТУРА
        - **Нижняя навигация (Tab Bar)** — используй для основных разделов. Активный таб — подчёркивание 2px, цвет primary.
        - **Верхняя навигация** — заголовок экрана, кнопка «Назад» (если нужно), кнопки действий.
        - **Модальные окна** — для подтверждения действий.
        - **Драйверы (Action Sheets)** — для выбора из нескольких вариантов.

5.  GENERAL RULES FOR AI
    ----------------------
    - Всегда используй CSS-переменные для цветов и типографики.
    - Для кнопок Primary используй класс .btn, для Secondary — .btn-secondary.
    - Поля ввода (Input) всегда используй с плавающим лейблом (.floating-label).
    - Для выбора продукта используй .product-select.
    - В дропдаунах для полей выбора используй .dropdown-field вместо .product-select, чтобы избежать конфликтов.
    - Модальное окно и драйвер должны иметь обводку 1px solid var(--color-divider).
    - Для состояний (focus, error, disabled) добавляй соответствующие классы.
    - Всегда проверяй, что вёрстка соответствует мобильному viewport (360px / 328px).
    - Следуй принципам юзабилити и банковской специфике.

6.  РЕКОМЕНДАЦИИ ПО ПОСТРОЕНИЮ ИНТЕРФЕЙСОВ
    ------------------------------------------------------------
    A.  ОБЩИЕ ПРИНЦИПЫ
        - Заголовок экрана и все поля формы должны отступать от статусбара минимум 20px.
        - В Android-макетах статусбар: монохромные иконки цвета divider, вместо батарейки — сеть (Wi-Fi).
        - Отмена (Cancel) всегда располагается под основной кнопкой действия.

    B.  ДРОПДАУНЫ (ВЫПАДАЮЩИЕ СПИСКИ)
        - Дропдаун должен перекрывать следующий элемент (z-index выше).
        - Иконка счёта в свёрнутом состоянии — 32px, в выпадающем списке — 40px.
        - Текст суммы в дропдауне: шрифт body-large, цвет text-primary.

    C.  ПРЕДПРОСМОТР (PREVIEW FIELDS)
        - Используй preview-field-wrapper для отображения данных без редактирования.
        - Сумма в предпросмотре — обычным цветом (text-primary), без зелёного выделения.

    D.  ЭКРАН УСПЕХА (SUCCESS STATE)
        - Зелёный круг с галочкой: размер 80×80px.
        - Обводка: 12px, rgba(20, 165, 81, 0.1) (10% прозрачности primary).
        - Заголовок: heading-medium, подпись: caption-regular, цвет text-gray.

7.  СЦЕНАРИИ И МАКЕТЫ ЭКРАНОВ БАНКОВСКОГО ПРИЛОЖЕНИЯ
    ------------------------------------------------------------
    A.  ГЛАВНЫЙ ЭКРАН (Dashboard)
        - Верхняя навигация: имя пользователя слева, иконка уведомлений и иконка QR-кода справа.
        - Баланс (свёрнутый) — общий остаток по всем продуктам.
        - Список продуктов клиента: карты, счета, вклады, кредиты (карусель или вертикальный список).
        - Быстрые действия: «Перевести», «Пополнить», «Платежи» (плитки).
        - Последние операции (3–5) с датой, суммой, типом.
        - Баннеры акций и офферов (закрываемые).

    B.  ЭКРАН ПЕРЕВОДА ПО РЕКВИЗИТАМ
        - Шаг 1: выбор счёта списания (product-select).
        - Шаг 2: ввод реквизитов получателя (БИК, номер счёта, ФИО).
        - Шаг 3: ввод суммы и назначение платежа (опционально).
        - Шаг 4: предпросмотр и подтверждение (preview-field).
        - Шаг 5: успех или ошибка.

    C.  ЭКРАН ОПЛАТЫ ПО QR-КОДУ
        - На главном экране нажать иконку QR.
        - Открывается сканер с рамкой для наведения.
        - После распознавания — экран предпросмотра (получатель, сумма, назначение).
        - Подтверждение через PIN/Face ID/SMS-код.
        - Успех или ошибка.

    D.  ЭКРАН УПРАВЛЕНИЯ ПРОДУКТАМИ (КРЕДИТ / ВКЛАД / КАРТА)
        - Карта: баланс, номер (скрытый), лимиты, последние операции, кнопки «Пополнить», «Заблокировать», «Сменить PIN».
        - Вклад: сумма, ставка, срок, дата окончания, график выплат, кнопка «Пополнить».
        - Кредит: сумма, ежемесячный платёж, задолженность, дата следующего платежа, график платежей, кнопка «Погасить».
        - Критичные действия — дополнительное подтверждение.

    E.  ЭКРАН ОНЛАЙН-ЧАТА И ПОДДЕРЖКИ
        - Список чатов: иконка, название, последнее сообщение, время, уведомления.
        - Экран чата: сообщения, поле ввода с кнопкой отправки.
        - Быстрые ответы (чипсы) для частых вопросов.
        - Прикрепление файлов (скриншотов).

    F.  ЭКРАН ИСТОРИИ ОПЕРАЦИЙ
        - Фильтры: период, тип операции, сумма.
        - Список операций: иконка, название, сумма, дата.
        - При нажатии — детали операции: сумма, дата, время, тип, статус, комиссия, получатель.
        - Поиск по названию или сумме.

    G.  ЭКРАН ПРОФИЛЯ И НАСТРОЕК
        - Аватар, имя, телефон, email.
        - Пункты меню: Уведомления, Лимиты и блокировки, Безопасность (Face ID, PIN), Доверенные устройства, Выход.
        - Поддержка: ссылка на чат, телефоны горячей линии.
        - Выход — с подтверждением через модалку.
